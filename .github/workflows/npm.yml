name: npm Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm (true/false)'
        required: true
        default: 'false'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Refuse prerelease npm publish
        working-directory: mcp-server
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "npm package version: $VERSION"
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::Refusing npm publish for prerelease version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        working-directory: mcp-server
        run: bun install

      - name: Build
        working-directory: mcp-server
        run: bun run build

      - name: Verify package (dry-run)
        working-directory: mcp-server
        run: npm publish --access public --dry-run

      - name: Publish to npm
        working-directory: mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
