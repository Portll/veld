<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Hop Scoring Pipeline - veld LOCOMO</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --orange: #d29922; --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
.header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 16px; font-weight: 600; }
.header .build { color: var(--text-dim); font-size: 12px; }
.controls { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.controls button { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
.controls button:hover { border-color: var(--accent); }
.controls button.active { background: var(--accent); color: #000; border-color: var(--accent); }
.main { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 120px); }
.sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.sidebar h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.layer-list { display: flex; flex-direction: column; gap: 4px; }
.layer-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
.layer-item:hover { background: var(--surface); }
.layer-item.active { background: var(--surface); border-left: 3px solid var(--accent); }
.layer-item .name { font-size: 12px; }
.layer-item .delta { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
.delta-pos { background: rgba(63,185,80,0.15); color: var(--green); }
.delta-neg { background: rgba(248,81,73,0.15); color: var(--red); }
.delta-neutral { background: rgba(139,148,158,0.15); color: var(--text-dim); }
.canvas-area { padding: 20px; overflow: auto; }
#chart { width: 100%; height: 400px; }
.score-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.score-table th, .score-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
.score-table th { color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
.score-table tr.target { background: rgba(88,166,255,0.08); }
.score-table tr.miss { background: rgba(248,81,73,0.05); }
.score-bar { display: inline-block; height: 14px; border-radius: 2px; min-width: 2px; vertical-align: middle; }
.rank-badge { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; font-size: 11px; font-weight: 600; }
.rank-1 { background: var(--green); color: #000; }
.rank-2 { background: rgba(63,185,80,0.4); color: var(--text); }
.rank-3 { background: rgba(210,153,34,0.4); color: var(--text); }
.rank-gt3 { background: rgba(139,148,158,0.2); color: var(--text-dim); }
.formula { background: var(--surface); padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 12px; border-left: 3px solid var(--purple); }
.formula .fn-name { color: var(--purple); font-weight: 600; }
.formula .param { color: var(--orange); }
.formula .val { color: var(--green); }
.info-row { display: flex; gap: 16px; margin-bottom: 16px; }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; flex: 1; }
.info-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
.info-card .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
.info-card .value.perfect { color: var(--green); }
svg text { font-family: 'SF Mono', 'Fira Code', monospace; }
</style>
</head>

let activeQuery = 0;
let activeLayer = null;

function init() {
  // Build query buttons
  const btnContainer = document.getElementById('queryButtons');
  QUERIES.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.textContent = `Q${i+1}: ${q.text.substring(0, 50)}...`;
    btn.onclick = () => selectQuery(i);
    if (i === 0) btn.classList.add('active');
    btnContainer.appendChild(btn);
  });

  selectQuery(0);
}

function selectQuery(idx) {
  activeQuery = idx;
  activeLayer = null;
  document.querySelectorAll('.controls button').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  renderLayerList();
  renderChart();
}

function renderLayerList() {
  const q = QUERIES[activeQuery];
  const list = document.getElementById('layerList');
  list.innerHTML = '';

  LAYER_ORDER.forEach(layerName => {
    const layer = q.layers[layerName];
    if (!layer) return;

    const item = document.createElement('div');
    item.className = 'layer-item' + (activeLayer === layerName ? ' active' : '');
    item.onclick = () => { activeLayer = layerName; renderLayerList(); renderChart(); };

    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = layerName;

    const delta = document.createElement('span');
    if (!layer.fires) {
      delta.className = 'delta delta-neutral';
      delta.textContent = 'skip';
    } else if (layer.scores) {
      // Calculate rank change for expected memories
      delta.className = 'delta delta-pos';
      delta.textContent = 'active';
    } else {
      delta.className = 'delta delta-neutral';
      delta.textContent = 'gate';
    }

    item.appendChild(name);
    item.appendChild(delta);
    list.appendChild(item);
  });
}

function renderChart() {
  const q = QUERIES[activeQuery];
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');

  // Set canvas size
  canvas.width = canvas.parentElement.clientWidth - 40;
  canvas.height = 400;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Collect all layers with scores
  const scoredLayers = LAYER_ORDER.filter(l => q.layers[l] && q.layers[l].scores);

  // Collect all memory IDs across all layers
  const allIds = new Set();
  scoredLayers.forEach(l => {
    Object.keys(q.layers[l].scores).forEach(id => allIds.add(parseInt(id)));
  });
  const memIds = Array.from(allIds).sort((a, b) => a - b);

  // Colors for memories
  const colors = {};
  const palette = ['#58a6ff', '#3fb950', '#f85149', '#d29922', '#bc8cff', '#f778ba', '#79c0ff', '#56d4dd', '#e3b341', '#ff9bce'];
  memIds.forEach((id, i) => {
    colors[id] = q.expected.includes(id)
      ? (i % 2 === 0 ? '#3fb950' : '#2ea043')
      : palette[i % palette.length];
  });

  // Layout
  const padL = 120, padR = 30, padT = 40, padB = 60;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  // X axis: layers
  const xStep = plotW / Math.max(scoredLayers.length - 1, 1);

  // Y axis: score
  let maxScore = 0;
  scoredLayers.forEach(l => {
    Object.values(q.layers[l].scores).forEach(s => { if (s > maxScore) maxScore = s; });
  });
  maxScore = Math.ceil(maxScore * 20) / 20; // Round up to nearest 0.05

  const yScale = (s) => padT + plotH - (s / maxScore) * plotH;
  const xPos = (i) => padL + i * xStep;

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let s = 0; s <= maxScore; s += 0.05) {
    const y = yScale(s);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();
    ctx.fillStyle = '#484f58';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(s.toFixed(2), padL - 8, y + 3);
  }

  // Draw lines for each memory
  memIds.forEach(id => {
    ctx.strokeStyle = colors[id];
    ctx.lineWidth = q.expected.includes(id) ? 3 : 1.5;
    ctx.globalAlpha = q.expected.includes(id) ? 1.0 : 0.4;
    ctx.beginPath();
    let started = false;
    scoredLayers.forEach((l, i) => {
      const score = q.layers[l].scores[id];
      if (score !== undefined) {
        const x = xPos(i), y = yScale(score);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
    });
    ctx.stroke();

    // Dots
    ctx.globalAlpha = 1.0;
    scoredLayers.forEach((l, i) => {
      const score = q.layers[l].scores[id];
      if (score !== undefined) {
        const x = xPos(i), y = yScale(score);
        ctx.fillStyle = colors[id];
        ctx.beginPath();
        ctx.arc(x, y, q.expected.includes(id) ? 5 : 3, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  });

  // X axis labels
  ctx.fillStyle = '#8b949e';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  scoredLayers.forEach((l, i) => {
    const x = xPos(i);
    ctx.save();
    ctx.translate(x, H - padB + 12);
    ctx.rotate(-0.5);
    ctx.textAlign = 'right';
    ctx.fillText(l, 0, 0);
    ctx.restore();

    // Highlight active layer
    if (activeLayer === l) {
      ctx.strokeStyle = '#58a6ff44';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, padT);
      ctx.lineTo(x, padT + plotH);
      ctx.stroke();
    }
  });

  // Legend
  const legendX = padL + 10, legendY = padT + 10;
  memIds.forEach((id, i) => {
    const ly = legendY + i * 16;
    ctx.fillStyle = colors[id];
    ctx.fillRect(legendX, ly - 5, 10, 10);
    ctx.fillStyle = q.expected.includes(id) ? '#3fb950' : '#8b949e';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    const label = MEMORY_LABELS[id] || `M${id}`;
    const marker = q.expected.includes(id) ? ' *' : '';
    ctx.fillText(`M${id}: ${label}${marker}`, legendX + 14, ly + 4);
  });

  // Render detail panel
  renderDetail();
}

function renderDetail() {
  const q = QUERIES[activeQuery];
  const detail = document.getElementById('detail');

  let html = `<div style="margin-top:20px">`;
  html += `<div class="formula"><strong>Query:</strong> "${q.text}"<br>`;
  html += `<strong>Expected:</strong> [${q.expected.map(e => `M${e} (${MEMORY_LABELS[e]})`).join(', ')}]<br>`;
  html += `<strong>Retrieved:</strong> [${q.retrieved.map(e => `M${e}`).join(', ')}] &mdash; MRR=${q.mrr.toFixed(2)}</div>`;

  if (activeLayer && q.layers[activeLayer]) {
    const layer = q.layers[activeLayer];
    const info = LAYER_FNS[activeLayer] || {};
    html += `<h3 style="margin:16px 0 8px;font-size:14px">${activeLayer}</h3>`;
    html += `<div class="formula">`;
    if (info.file) html += `<span class="fn-name">File:</span> <span class="param">${info.file}</span><br>`;
    if (info.fn) html += `<span class="fn-name">Function:</span> <span class="val">${info.fn}</span><br>`;
    if (layer.fn) html += `<span class="fn-name">This query:</span> ${layer.fn}<br>`;
    if (layer.formula) html += `<span class="fn-name">Formula:</span> <code>${layer.formula}</code><br>`;
    if (layer.detail) html += `<span class="fn-name">Detail:</span> ${layer.detail}<br>`;
    if (layer.reason) html += `<span class="fn-name">Skip reason:</span> ${layer.reason}<br>`;
    if (layer.decomposed !== undefined) html += `<span class="fn-name">Decomposed:</span> ${layer.decomposed ? 'Yes' : 'No'}<br>`;
    if (layer.sub_queries) html += `<span class="fn-name">Sub-queries:</span><br>${layer.sub_queries.map(s => `&nbsp;&nbsp;- "${s}"`).join('<br>')}<br>`;
    html += `</div>`;

    if (layer.scores) {
      html += `<table class="score-table"><tr><th>Memory</th><th>Label</th><th>Score</th><th>Rank</th><th>Target?</th></tr>`;
      const sorted = Object.entries(layer.scores).sort((a, b) => b[1] - a[1]);
      sorted.forEach(([id, score], rank) => {
        const isTarget = q.expected.includes(parseInt(id));
        const rankClass = rank === 0 ? 'rank-1' : rank === 1 ? 'rank-2' : rank === 2 ? 'rank-3' : 'rank-gt3';
        html += `<tr class="${isTarget ? 'target' : ''}">`;
        html += `<td>M${id}</td>`;
        html += `<td>${MEMORY_LABELS[parseInt(id)] || '?'}</td>`;
        html += `<td><span class="score-bar" style="width:${score/0.4*200}px;background:${isTarget ? 'var(--green)' : 'var(--accent)'}"></span> ${score.toFixed(3)}</td>`;
        html += `<td><span class="rank-badge ${rankClass}">${rank + 1}</span></td>`;
        html += `<td>${isTarget ? 'YES' : ''}</td>`;
        html += `</tr>`;
      });
      html += `</table>`;
    }
  } else {
    // Show all layers summary
    html += `<h3 style="margin:16px 0 8px;font-size:14px">Layer Impact Summary</h3>`;
    html += `<p style="color:var(--text-dim);font-size:12px;margin-bottom:12px">Click a layer in the sidebar to see scoring detail. Green lines = expected memories. * = target.</p>`;
    html += `<table class="score-table"><tr><th>Layer</th><th>Fires?</th><th>Function</th><th>Key Impact</th></tr>`;
    LAYER_ORDER.forEach(l => {
      const layer = q.layers[l];
      if (!layer) return;
      const info = LAYER_FNS[l] || {};
      html += `<tr>`;
      html += `<td style="white-space:nowrap">${l}</td>`;
      html += `<td>${layer.fires ? '<span style="color:var(--green)">YES</span>' : '<span style="color:var(--text-dim)">no</span>'}</td>`;
      html += `<td style="font-size:11px">${info.fn || ''}</td>`;
      html += `<td style="font-size:11px">${layer.detail || layer.reason || (layer.decomposed ? `Decomposed: ${layer.sub_queries?.length} sub-queries` : '')}</td>`;
      html += `</tr>`;
    });
    html += `</table>`;
  }

  html += `</div>`;
  detail.innerHTML = html;
}

window.addEventListener('resize', () => renderChart());
init();
</script>
</body>
</html>
