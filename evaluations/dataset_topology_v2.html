<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Benchmark v2 — Dataset Topology</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; overflow-x: hidden; }
.header { padding: 20px 24px; border-bottom: 1px solid #1a1a2e; background: #0d0d15; }
.header h1 { font-size: 16px; font-weight: 600; color: #f0f0f0; margin-bottom: 4px; }
.header .meta { font-size: 11px; color: #666; }
.container { display: flex; height: calc(100vh - 70px); }
.sidebar { width: 320px; border-right: 1px solid #1a1a2e; overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; position: relative; overflow: hidden; }
.panel { padding: 12px 16px; border-bottom: 1px solid #1a1a2e; }
.panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 8px; }
.stat { display: inline-block; margin-right: 16px; margin-bottom: 4px; }
.stat .num { font-size: 20px; font-weight: 700; }
.stat .label { font-size: 10px; color: #666; text-transform: uppercase; }

/* Session colors */
.s1 { color: #4ecdc4; } .s1-bg { background: #4ecdc4; }
.s2 { color: #45b7d1; } .s2-bg { background: #45b7d1; }
.s3 { color: #f7dc6f; } .s3-bg { background: #f7dc6f; }
.s4 { color: #e74c3c; } .s4-bg { background: #e74c3c; }
.s5 { color: #a29bfe; } .s5-bg { background: #a29bfe; }
.s6 { color: #fd79a8; } .s6-bg { background: #fd79a8; }

.session-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.session-chip { font-size: 10px; padding: 2px 8px; border-radius: 3px; cursor: pointer; opacity: 0.8; }
.session-chip:hover { opacity: 1; }
.session-chip.active { opacity: 1; outline: 1px solid #fff; }

/* Query type badges */
.qt-badge { font-size: 9px; padding: 1px 6px; border-radius: 2px; display: inline-block; margin: 1px; }
.qt-single_hop { background: #1a3a2a; color: #4ecdc4; }
.qt-temporal { background: #3a3a1a; color: #f7dc6f; }
.qt-multi_hop { background: #1a1a3a; color: #45b7d1; }
.qt-open_domain { background: #2a1a2a; color: #a29bfe; }
.qt-negation { background: #3a1a1a; color: #e74c3c; }
.qt-negative { background: #3a2a1a; color: #fd79a8; }
.qt-who_person { background: #1a2a3a; color: #74b9ff; }

/* Challenge tags */
.ct-badge { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: #1a1a1a; color: #888; border: 1px solid #333; display: inline-block; margin: 1px; }

/* Query list */
.query-item { padding: 8px 12px; border-bottom: 1px solid #111; cursor: pointer; transition: background 0.15s; }
.query-item:hover { background: #111; }
.query-item.selected { background: #1a1a2e; border-left: 2px solid #45b7d1; }
.query-item .q-text { font-size: 12px; color: #ccc; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.query-item .q-meta { font-size: 10px; color: #555; }

/* Canvas */
canvas { display: block; }

/* Detail panel */
.detail-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #0d0d15; border-top: 1px solid #1a1a2e; padding: 12px 16px; max-height: 40%; overflow-y: auto; display: none; }
.detail-panel.visible { display: block; }
.detail-panel h3 { font-size: 13px; margin-bottom: 8px; }
.detail-panel .field { margin-bottom: 6px; }
.detail-panel .field-name { font-size: 10px; color: #666; text-transform: uppercase; }
.detail-panel .field-value { font-size: 12px; color: #ccc; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 8px; }
.tab { padding: 6px 12px; font-size: 11px; background: #111; border: 1px solid #1a1a2e; cursor: pointer; color: #666; }
.tab:first-child { border-radius: 4px 0 0 4px; }
.tab:last-child { border-radius: 0 4px 4px 0; }
.tab.active { background: #1a1a2e; color: #e0e0e0; border-color: #333; }

/* Filter */
.filter-input { width: 100%; padding: 6px 10px; background: #111; border: 1px solid #1a1a2e; color: #ccc; font-family: inherit; font-size: 12px; border-radius: 4px; margin-bottom: 8px; }
.filter-input:focus { outline: none; border-color: #45b7d1; }
</style>
</head>
<body>
<div class="header">
  <h1>Nexus Benchmark v2 — Dataset Topology</h1>
  <div class="meta">95 memories × 60 queries × 7 persons × 6 sessions | Generated 2026-03-28</div>
</div>
<div class="container">
  <div class="sidebar">
    <div class="panel">
      <h2>Overview</h2>
      <div>
        <span class="stat"><span class="num" id="mem-count">95</span><br><span class="label">Memories</span></span>
        <span class="stat"><span class="num" id="query-count">60</span><br><span class="label">Queries</span></span>
        <span class="stat"><span class="num" id="person-count">7</span><br><span class="label">Persons</span></span>
      </div>
    </div>
    <div class="panel">
      <h2>Sessions</h2>
      <div class="session-legend" id="session-legend"></div>
    </div>
    <div class="panel">
      <h2>Queries</h2>
      <div class="tabs" id="view-tabs">
        <div class="tab active" data-view="queries">Queries</div>
        <div class="tab" data-view="types">By Type</div>
        <div class="tab" data-view="challenges">Challenges</div>
      </div>
      <input type="text" class="filter-input" id="query-filter" placeholder="Filter queries...">
      <div id="query-list"></div>
    </div>
  </div>
  <div class="main">
    <canvas id="canvas"></canvas>
    <div class="detail-panel" id="detail-panel">
      <h3 id="detail-title"></h3>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script>
// Dataset loaded via fetch or inline
let DATASET = null;

// Session colors
const SESSION_COLORS = {
  1: '#4ecdc4', 2: '#45b7d1', 3: '#f7dc6f',
  4: '#e74c3c', 5: '#a29bfe', 6: '#fd79a8'
};
const TYPE_COLORS = {
  'Conversation': '#6c757d', 'Decision': '#28a745', 'Error': '#dc3545',
  'Learning': '#ffc107', 'Discovery': '#17a2b8', 'Pattern': '#6f42c1',
  'Context': '#495057', 'Task': '#007bff', 'Observation': '#20c997',
  'CodeEdit': '#e83e8c', 'Command': '#fd7e14'
};

// State
let selectedQuery = null;
let hoveredMemory = null;
let memoryPositions = [];
let canvasWidth, canvasHeight;
let filterSession = null;

// Init
function init() {
  buildSessionLegend();
  buildQueryList();
  setupCanvas();
  layoutMemories();
  render();
  setupInteraction();
}

function buildSessionLegend() {
  const el = document.getElementById('session-legend');
  DATASET.sessions.forEach(s => {
    const chip = document.createElement('div');
    chip.className = `session-chip`;
    chip.style.background = SESSION_COLORS[s.id] + '33';
    chip.style.color = SESSION_COLORS[s.id];
    chip.textContent = `S${s.id}: ${s.name}`;
    chip.onclick = () => {
      if (filterSession === s.id) { filterSession = null; chip.classList.remove('active'); }
      else {
        document.querySelectorAll('.session-chip').forEach(c => c.classList.remove('active'));
        filterSession = s.id;
        chip.classList.add('active');
      }
      render();
    };
    el.appendChild(chip);
  });
}

function buildQueryList(filter = '') {
  const el = document.getElementById('query-list');
  el.innerHTML = '';
  const lf = filter.toLowerCase();
  DATASET.queries
    .filter(q => !lf || q.query.toLowerCase().includes(lf) || q.query_type.includes(lf))
    .forEach(q => {
      const item = document.createElement('div');
      item.className = 'query-item' + (selectedQuery === q.id ? ' selected' : '');
      item.innerHTML = `
        <div class="q-text">${q.query}</div>
        <div class="q-meta">
          <span class="qt-badge qt-${q.query_type}">${q.query_type}</span>
          ${q.challenge_tags.map(t => `<span class="ct-badge">${t}</span>`).join('')}
          <span style="margin-left:4px;color:#444">E:${q.expected_memory_ids.length} A:${q.absence_memory_ids.length}</span>
        </div>`;
      item.onclick = () => selectQuery(q.id);
      el.appendChild(item);
    });
}

function selectQuery(qid) {
  selectedQuery = selectedQuery === qid ? null : qid;
  buildQueryList(document.getElementById('query-filter').value);
  if (selectedQuery !== null) {
    const q = DATASET.queries.find(q => q.id === selectedQuery);
    showDetail(q);
  } else {
    document.getElementById('detail-panel').classList.remove('visible');
  }
  render();
}

function showDetail(q) {
  const dp = document.getElementById('detail-panel');
  dp.classList.add('visible');
  document.getElementById('detail-title').textContent = `Q${q.id}: ${q.query}`;
  const expectedMems = q.expected_memory_ids.map(id => {
    const m = DATASET.memories.find(m => m.id === id);
    return m ? `[${id}] ${m.content.substring(0, 80)}...` : `[${id}] ???`;
  });
  const absenceMems = q.absence_memory_ids.map(id => {
    const m = DATASET.memories.find(m => m.id === id);
    return m ? `[${id}] ${m.content.substring(0, 80)}...` : `[${id}] ???`;
  });

  document.getElementById('detail-content').innerHTML = `
    <div class="field"><div class="field-name">Type</div><div class="field-value"><span class="qt-badge qt-${q.query_type}">${q.query_type}</span> ${q.difficulty}</div></div>
    <div class="field"><div class="field-name">Challenge Tags</div><div class="field-value">${q.challenge_tags.length ? q.challenge_tags.map(t => `<span class="ct-badge">${t}</span>`).join(' ') : 'none'}</div></div>
    ${q.who_entity ? `<div class="field"><div class="field-name">WHO Entity</div><div class="field-value">${q.who_entity}</div></div>` : ''}
    <div class="field"><div class="field-name">Expected (${q.expected_memory_ids.length})</div><div class="field-value" style="font-size:11px;white-space:pre-wrap;">${expectedMems.join('\n')}</div></div>
    <div class="field"><div class="field-name">Absence (${q.absence_memory_ids.length})</div><div class="field-value" style="font-size:11px;white-space:pre-wrap;color:#e74c3c;">${absenceMems.join('\n') || 'none'}</div></div>
    <div class="field"><div class="field-name">Answer Sketch</div><div class="field-value">${q.expected_answer_sketch}</div></div>
    <div class="field"><div class="field-name">Rationale</div><div class="field-value" style="color:#888;">${q.rationale}</div></div>
    <div class="field"><div class="field-name">Review</div><div class="field-value" style="color:${q.review_status === 'approved' ? '#4ecdc4' : '#f7dc6f'}">${q.review_status}</div></div>
  `;
}

// Canvas
function setupCanvas() {
  const canvas = document.getElementById('canvas');
  const main = document.querySelector('.main');
  canvasWidth = main.clientWidth;
  canvasHeight = main.clientHeight;
  canvas.width = canvasWidth * window.devicePixelRatio;
  canvas.height = canvasHeight * window.devicePixelRatio;
  canvas.style.width = canvasWidth + 'px';
  canvas.style.height = canvasHeight + 'px';
}

function layoutMemories() {
  memoryPositions = [];
  const sessions = {};
  DATASET.memories.forEach(m => {
    if (!sessions[m.session]) sessions[m.session] = [];
    sessions[m.session].push(m);
  });

  const sessionKeys = Object.keys(sessions).map(Number).sort();
  const cols = sessionKeys.length;
  const colWidth = canvasWidth / cols;

  sessionKeys.forEach((sid, ci) => {
    const mems = sessions[sid];
    const rowHeight = (canvasHeight - 100) / (mems.length + 1);
    mems.forEach((m, ri) => {
      memoryPositions.push({
        id: m.id,
        x: colWidth * ci + colWidth / 2,
        y: 40 + rowHeight * (ri + 1),
        radius: 4 + m.importance * 8,
        session: m.session,
        memory: m
      });
    });
  });
}

function render() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  const q = selectedQuery !== null ? DATASET.queries.find(q => q.id === selectedQuery) : null;
  const expectedSet = q ? new Set(q.expected_memory_ids) : new Set();
  const acceptableSet = q ? new Set(q.acceptable_memory_ids) : new Set();
  const absenceSet = q ? new Set(q.absence_memory_ids) : new Set();

  // Draw session columns
  const sessions = [...new Set(DATASET.memories.map(m => m.session))].sort();
  const colWidth = canvasWidth / sessions.length;
  sessions.forEach((sid, i) => {
    ctx.fillStyle = SESSION_COLORS[sid] + '08';
    ctx.fillRect(colWidth * i, 0, colWidth, canvasHeight);
    ctx.fillStyle = SESSION_COLORS[sid] + '88';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    const session = DATASET.sessions.find(s => s.id === sid);
    ctx.fillText(`S${sid}: ${session ? session.name : ''}`, colWidth * i + colWidth / 2, 20);
  });

  // Draw connections for selected query
  if (q) {
    // Draw edges between expected memories
    const expectedPositions = memoryPositions.filter(p => expectedSet.has(p.id));
    ctx.strokeStyle = '#45b7d133';
    ctx.lineWidth = 1;
    for (let i = 0; i < expectedPositions.length - 1; i++) {
      for (let j = i + 1; j < expectedPositions.length; j++) {
        ctx.beginPath();
        ctx.moveTo(expectedPositions[i].x, expectedPositions[i].y);
        ctx.lineTo(expectedPositions[j].x, expectedPositions[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw memory nodes
  memoryPositions.forEach(p => {
    const dimmed = filterSession && p.session !== filterSession;
    let fillColor = SESSION_COLORS[p.session] || '#666';
    let strokeColor = 'transparent';
    let alpha = dimmed ? 0.15 : 0.7;
    let r = p.radius;

    if (q) {
      if (expectedSet.has(p.id)) {
        fillColor = '#4ecdc4';
        strokeColor = '#fff';
        alpha = 1;
        r += 3;
      } else if (acceptableSet.has(p.id)) {
        fillColor = '#45b7d1';
        strokeColor = '#45b7d1';
        alpha = 0.9;
        r += 1;
      } else if (absenceSet.has(p.id)) {
        fillColor = '#e74c3c';
        strokeColor = '#e74c3c';
        alpha = 0.9;
        r += 2;
      } else {
        alpha = 0.15;
      }
    }

    if (hoveredMemory === p.id) {
      alpha = 1;
      r += 2;
      strokeColor = '#fff';
    }

    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
    if (strokeColor !== 'transparent') {
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Draw ID label for highlighted nodes
    if (alpha > 0.5) {
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.id.toString(), p.x, p.y - r - 4);
    }
  });

  ctx.globalAlpha = 1;

  // Legend
  if (q) {
    const ly = canvasHeight - 40;
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    [['#4ecdc4', 'Expected'], ['#45b7d1', 'Acceptable'], ['#e74c3c', 'Absence']].forEach(([c, l], i) => {
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(20 + i * 120, ly, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.fillText(l, 30 + i * 120, ly + 4);
    });
  }
}

function setupInteraction() {
  const canvas = document.getElementById('canvas');

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let found = null;
    for (const p of memoryPositions) {
      const dx = mx - p.x, dy = my - p.y;
      if (dx * dx + dy * dy < (p.radius + 4) * (p.radius + 4)) {
        found = p.id;
        break;
      }
    }

    if (found !== hoveredMemory) {
      hoveredMemory = found;
      canvas.style.cursor = found !== null ? 'pointer' : 'default';
      render();
    }
  });

  canvas.addEventListener('click', (e) => {
    if (hoveredMemory !== null) {
      const m = DATASET.memories.find(m => m.id === hoveredMemory);
      if (m) showMemoryDetail(m);
    }
  });

  document.getElementById('query-filter').addEventListener('input', (e) => {
    buildQueryList(e.target.value);
  });

  window.addEventListener('resize', () => {
    setupCanvas();
    layoutMemories();
    render();
  });
}

function showMemoryDetail(m) {
  const dp = document.getElementById('detail-panel');
  dp.classList.add('visible');
  document.getElementById('detail-title').textContent = `Memory[${m.id}]`;

  const referencedBy = DATASET.queries.filter(q =>
    q.expected_memory_ids.includes(m.id) ||
    q.acceptable_memory_ids.includes(m.id) ||
    q.absence_memory_ids.includes(m.id)
  );

  document.getElementById('detail-content').innerHTML = `
    <div class="field"><div class="field-name">Content</div><div class="field-value">${m.content}</div></div>
    <div class="field"><div class="field-name">Type / Session / Importance</div><div class="field-value">${m.experience_type} · S${m.session} · ${m.importance}</div></div>
    <div class="field"><div class="field-name">Person Mentions</div><div class="field-value">${m.person_mentions.length ? m.person_mentions.join(', ') : 'none'}</div></div>
    <div class="field"><div class="field-name">Tags</div><div class="field-value">${m.tags.join(', ')}</div></div>
    <div class="field"><div class="field-name">Narrative Notes</div><div class="field-value" style="color:#888">${m.narrative_notes || 'none'}</div></div>
    <div class="field"><div class="field-name">Referenced by ${referencedBy.length} queries</div><div class="field-value" style="font-size:11px">${referencedBy.map(q => `Q${q.id}: ${q.query.substring(0, 60)}...`).join('<br>')}</div></div>
  `;
}

// Load and render
fetch('../tests/datasets/nexus_benchmark_v2.json')
  .then(r => r.json())
  .then(d => { DATASET = d; init(); })
  .catch(() => {
    document.body.innerHTML = '<div style="padding:40px;color:#e74c3c;">Failed to load dataset. Serve this file from the repo root:<br><code>python3 -m http.server 8080</code><br>Then open <code>http://localhost:8080/evaluations/dataset_topology_v2.html</code></div>';
  });
</script>
</body>
</html>
